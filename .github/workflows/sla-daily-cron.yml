name: SLA Daily Cron

on:
  schedule:
    - cron: "30 0 * * *" # Daily 00:30 UTC (~06:30 Asia/Dhaka)
  workflow_dispatch:
    inputs:
      supplier_id:
        description: "Optional supplier id for targeted run"
        required: false
        type: string

jobs:
  run-sla-cron:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.SLA_CRON_URL }}" ]; then
            echo "Missing GitHub secret: SLA_CRON_URL"
            exit 1
          fi
          if [ -z "${{ secrets.CRON_SECRET }}" ]; then
            echo "Missing GitHub secret: CRON_SECRET"
            exit 1
          fi

      - name: Trigger SLA evaluation endpoint
        env:
          SLA_CRON_URL: ${{ secrets.SLA_CRON_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SUPPLIER_ID: ${{ github.event.inputs.supplier_id }}
        run: |
          URL="$SLA_CRON_URL"
          if [ -n "$SUPPLIER_ID" ]; then
            URL="${URL}?supplierId=${SUPPLIER_ID}"
          fi

          echo "Triggering SLA cron endpoint..."
          RESPONSE=$(curl -sS -w "\n%{http_code}" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            "$URL")

          HTTP_BODY=$(echo "$RESPONSE" | sed '$d')
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)

          echo "HTTP status: $HTTP_CODE"
          echo "$HTTP_BODY"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "SLA cron endpoint failed."
            exit 1
          fi
